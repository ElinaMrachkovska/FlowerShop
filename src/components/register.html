<section id="register">
    <div class="container">
      <div class="text-center mb-5 reveal">
        <h2 class="section-title" data-i18n="reg_title">
          Дивіться та <span class="accent">реєструйтесь</span>
        </h2>
        <div class="divider mx-auto"></div>
        <p class="text-muted" data-i18n="reg_sub">
          Перегляньте відео про вирощування квітів і залиште заявку на наш каталог
        </p>
      </div>

      <div class="row g-4 align-items-start">
        <div class="col-lg-7 reveal">
          <div class="video-wrapper">
            <iframe
              src="https://www.youtube.com/embed/dJ98of_aJaQ?si=4ymxVSm8pQOheuII&rel=0&modestbranding=1"
              title="YouTube video player"
              frameborder="0"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              referrerpolicy="strict-origin-when-cross-origin"
              allowfullscreen>
            </iframe>
          </div>
        </div>

        <div class="col-lg-5 reveal">
          <div class="form-card">
            <h3 data-i18n="form_title">Отримайте каталог</h3>
            <p class="sub" data-i18n="form_sub">Залиште дані — ми надішлемо безкоштовний каталог насіння</p>
            <div class="form-group">
              <label class="form-label" for="f-first" data-i18n="form_fname">Ім'я *</label>
              <input type="text" id="f-first" name="first_name" class="form-control" data-i18n-placeholder="ph_fname" placeholder="Олена" required />
            </div>
            <div class="form-group">
              <label class="form-label" for="f-last" data-i18n="form_lname">Прізвище *</label>
              <input type="text" id="f-last" name="last_name" class="form-control" data-i18n-placeholder="ph_lname" placeholder="Іваненко" required />
            </div>
            <div class="form-group">
              <label class="form-label" for="f-email" data-i18n="form_email">Email *</label>
              <input type="email" id="f-email" name="email" class="form-control" data-i18n-placeholder="ph_email" placeholder="email@example.com" required />
            </div>
            <button type="button" id="form-submit" class="btn-submit" data-i18n="form_btn">🌸 Надіслати заявку</button>
            <div id="form-message" role="alert" aria-live="polite"></div>
          </div>
        </div>
      </div>
    </div>
  </section>
